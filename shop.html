<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartello – Shop</title>  
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/cart.css">
       <link rel="stylesheet" href="css/product.css">
</head>

<body>
 <header class="website-header">
    <div class="container nav">
    <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">☰</button>

<a href="index.html"  class="logo">CARTELLO</a>

<nav class="navbar" id="navbar">
     <a href="index.html" data-i18n="home">Home</a>
     <a href="shop.html" class="active" data-i18n="shop">Shop</a>
     <a href="cart.html" data-i18n="cart">Cart</a>
     <a href="login.html" data-i18n="login">Login</a>   
</nav>
<div class="header-tools">
<form class="search-form" onsubmit="event.preventDefault();">
    <input 
        class="search-input" 
        type="search" 
        id="product-search" 
        placeholder="Search products"
        data-i18n-placeholder="searchProducts"
        oninput="filterProducts()"
    >
    <button class="search-button" type="submit" data-i18n="search">Search</button>
</form>
<button class="lang-toggle" type="button" onclick="toggleLanguage()">عربي</button>
<a class="cart-link" href="cart.html">🛒 Cart
    <span class="cart-badge" id="cart-badge">0</span>
</a>
</div>
</div>
</header>

<main>
    <section class="shop-hero">
      <div class="shop-hero-content">
        <p class="shop-label">Shop</p>
        <h1>Browse Products</h1>
      </div>
    </section>

    <section class="products-section">
      <div id="no-results" style="display: none; text-align: center; padding: 20px;">
          <h3>No products found</h3>
      </div>

      <div class="shop-filters" style="text-align: center; margin-bottom: 20px;">
        <button class="search-button" onclick="setCategory('All')">All</button>
        <button class="search-button" onclick="setCategory('Electronics')">Electronics</button>
        <button class="search-button" onclick="setCategory('Accessories')">Accessories</button>
        <button class="search-button" onclick="setCategory('Grocery')">Grocery</button>
        <button class="search-button" onclick="setCategory('Skin Care')">Skin care</button>
        <button class="search-button" onclick="setCategory('Clothing')">Clothing</button>
        <button class="search-button" onclick="setCategory('Shoes')">Shoes</button>
        <button class="search-button" onclick="setCategory('Makeup')">Makeup</button>
        <button class="search-button" onclick="setCategory('Baby Care')">Baby Care</button>
        
      </div>
     
<div class="products-grid" id="product-container"></div>

<div id="pagination-controls" style="text-align: center; margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
    <button id="prev-btn" class="search-button" onclick="prevPage()">Previous</button>
    <span id="page-info" style="font-weight: bold; align-self: center;"></span>
    <button id="next-btn" class="search-button" onclick="nextPage()">Next</button>
</div>
    </section>
      
</main>

<footer class="page-footer">
    <div class="footer-content">
    <div>
        <h3>CARTELLO</h3>
        <p>Since 2026</p>
      </div>
      <div>
        <p>Email: cartelloteam@gmail.com</p>
        <p>Phone: +20 111 81 00000</p>
      </div>
      </div>
</footer>
<div id="product-modal" class="modal-overlay">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        
        <div id="modal-details-container"></div>
    </div>
</div>

<div id="messageBox" class="message-box"></div>
<script src="js/script.js"></script>
</body>
</html>
