<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartello – Checkout</title> 
   <link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/header.css">
<link rel="stylesheet" href="css/checkout.css">
<link rel="stylesheet" href="css/footer.css">
</head>
<body>
 <header class="website-header">
    <div class="container nav">
<a href="index.html" class="logo">CARTELLO</a>
<nav class="navbar" id="navbar">
     <a href="index.html">Home</a>
     <a href="shop.html">Shop</a>
     <a href="cart.html">Cart</a>
     <a href="login.html">Login</a>   
</nav>
<div class="header-tools">
<a class="cart-link" href="cart.html">🛒 Cart
    <span class="cart-badge" id="cart-badge">0</span>
</a>
</div>
</div>
</header>

 <main>
    <section class="checkout-page">
      <div class="checkout-grid">
        <div class="checkout-form-box">
          <h2>Checkout</h2>
          <p class="checkout-subtitle">Enter your details to place your order.</p>

          <form id="checkout-form" onsubmit="placeOrder(event)">
            <div class="input-field">
              <label>Full Name</label>
              <input type="text" id="customer-name" placeholder="Your full name" required>
            </div>

            <div class="input-field">
              <label>Email</label>
              <input type="email" id="customer-email" placeholder="you@example.com" required>
            </div>

            <div class="input-field">
              <label>Phone</label>
              <input type="text" id="customer-phone" placeholder="+20 1xx xxx xxxx" required>
            </div>

            <div class="input-field">
              <label>Address</label>
              <input type="text" id="customer-address" placeholder="Street, City, Area" required>
            </div>

            <div class="input-field">
              <label>Payment Method</label>
              <select id="payment-method" required>
                <option value="">Select payment method</option>
                <option value="Cash on Delivery">Cash on Delivery</option>
              </select>
            </div>

            <button type="submit" class="checkout-btn">Place Order</button>
          </form>
        </div>

        <div class="checkout-summary-box">
          <h2>Order Summary</h2>
          <div id="checkout-items"></div>
          <div id="checkout-total" class="checkout-total"></div>
        </div>
      </div>
    </section>
  </main>

<footer class="page-footer">
    <div class="footer-content">
    <div>
        <h3>CARTELLO</h3>
        <p>Since 2026</p>
      </div>
      <div>
        <p>Email: cartelloTeam@protonmail.com</p>
        <p>Phone: +20 111 81 00000</p>
      </div>
      </div>
</footer>
<script src="script.js"></script>
</body>
</html>
