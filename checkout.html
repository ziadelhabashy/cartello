<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartello – Checkout</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/header.css">
  <link rel="stylesheet" href="css/checkout.css">
  <link rel="stylesheet" href="css/footer.css">
</head>

<body>
  <header class="website-header">
    <div class="container nav">

      <button class="lang-toggle" type="button" onclick="toggleLanguage()">عربي</button>
      
      <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">☰</button>

      <a href="index.html" class="logo">CARTELLO</a>

      <nav class="navbar" id="navbar">
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="cart.html">Cart</a>
        <a href="login.html">Login</a>
      </nav>
      <div class="header-tools">
        <a class="cart-link" href="cart.html">🛒 Cart
          <span class="cart-badge" id="cart-badge">0</span>
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="checkout-page">
      <div class="checkout-grid">
        <div class="checkout-form-box">
          <h2>Checkout</h2>
          <p class="checkout-subtitle">Enter your details to place your order.</p>

          <form id="checkout-form" onsubmit="placeOrder(event)">
            <div class="input-field"> 
              <label>Full Name</label>
              <input type="text" id="customer-name" placeholder="Your full name" required>
            </div>

            <div class="input-field">
              <label>Email</label>
              <input type="email" id="customer-email" placeholder="you@example.com" required>
            </div>

            <div class="input-field">
              <label>Phone</label>
              <input type="text" id="customer-phone" placeholder="+20 1xx xxx xxxx" required>
            </div>

            <div class="input-field">
              <label>Governorate</label>
              <select id="customer-governorate" onchange="updateShipping()" required>
                <option value="">Select governorate</option>
                <option value="Cairo">Cairo</option>
                <option value="Giza">Giza</option>
                <option value="Alexandria">Alexandria</option>
                <option value="Dakahlia">Dakahlia</option>
                <option value="Sharqia">Sharqia</option>
                <option value="Monufia">Monufia</option>
                <option value="Qalyubia">Qalyubia</option>
                <option value="Beheira">Beheira</option>
                <option value="Kafr El Sheikh">Kafr El Sheikh</option>
                <option value="Gharbia">Gharbia</option>
                <option value="Port Said">Port Said</option>
                <option value="Suez">Suez</option>
                <option value="Ismailia">Ismailia</option>
                <option value="Damietta">Damietta</option>
                <option value="Fayoum">Fayoum</option>
                <option value="Beni Suef">Beni Suef</option>
                <option value="Minya">Minya</option>
                <option value="Assiut">Assiut</option>
                <option value="Sohag">Sohag</option>
                <option value="Qena">Qena</option>
                <option value="Luxor">Luxor</option>
                <option value="Aswan">Aswan</option>
                <option value="Red Sea">Red Sea</option>
                <option value="New Valley">New Valley</option>
                <option value="Matrouh">Matrouh</option>
                <option value="North Sinai">North Sinai</option>
                <option value="South Sinai">South Sinai</option>
              </select>
            </div>

            <div class="input-field">
              <label>Address</label>
              <input type="text" id="customer-address" placeholder="Street, City, Area" required>
            </div>

            <div class="input-field">
              <label>Payment Method</label>
              <select id="payment-method" required>
                <option value="">Select payment method</option>
                <option value="Cash on Delivery">Cash on Delivery</option>
              </select>
            </div>

            <button type="submit" class="checkout-btn">Place Order</button>
          </form>
        </div>

        <div class="checkout-summary-box">
          <h2>Order Summary</h2>
          <div id="checkout-items"></div>
          <div id="checkout-shipping" class="checkout-shipping"></div>
          <div id="checkout-total" class="checkout-total"></div>

        </div>
      </div>
    </section>
    <div id="order-success-modal" class="order-modal">
    <div class="order-modal-content">
    <div class="order-check">✓</div>
    <h2>Order Placed Successfully</h2>
    <p>Your order has been confirmed and will be processed soon.</p>
    <button class="order-modal-btn" onclick="closeOrderModal()">Back to Cart</button>
  </div>
</div>
  </main>

  <footer class="page-footer">
    <div class="footer-content">
      <div>
        <h3>CARTELLO</h3>
        <p>Since 2026</p>
      </div>
      <div>
        <p>Email: cartelloteam@gmail.com</p>
        <p>Phone: +20 111 81 00000</p>
      </div>
    </div>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
