<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartello – Admin</title>  
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/cart.css">
    <link rel="stylesheet" href="css/footer.css">
</head>
<body>
<script>
  if (!localStorage.getItem("adminSession")) {
    window.location.href = "login.html";
  }
</script>
 <header class="website-header">
  <button class="lang-toggle" type="button" onclick="toggleLanguage()">عربي</button>
    <div class="container nav">
    <button class="menu-toggle" id="menu-toggle" aria-label="Open menu">☰</button>

<a href="index.html" class="logo">CARTELLO</a>

<nav class="navbar" id="navbar">
     <a href="index.html" data-i18n="home">Home</a>
     <a href="shop.html" data-i18n="shop">Shop</a>
     <a href="#" onclick="adminLogout()" data-i18n="logout">Logout</a>
</nav>
</div>
</header>
<main>
  <div class="admin-layout">
  <aside class="admin-sidebar">
    <nav class="admin-nav">
        <button class="admin-link active" onclick="loadTab('dashboard', this)">📊 Dashboard</button>
        <button class="admin-link" onclick="loadTab('products', this)">📦 Products</button>
        <button class="admin-link" onclick="loadTab('orders', this)">🛒 Orders</button>
        <button class="admin-link" onclick="loadTab('users', this)">👥 Users</button>
        <button class="admin-link" onclick="loadTab('reports', this)">📈 Reports</button>
        <button class="admin-link" onclick="loadTab('policy', this)">📜 Policies</button>
    </nav>
</aside>

<section class="admin-content" id="admin-panel-content">
    <h2>Welcome, Admin</h2>
    <p>Select a module from the left to manage Cartello.</p>
</section>
</div>
</main>
<footer class="page-footer">
    <div class="footer-content">
    <div>
        <h3>CARTELLO</h3>
        <p>Since 2026</p>
      </div>
      <div>
        <p>Email: cartelloteam@gmail.com</p>
        <p>Phone: +20 111 81 00000</p>
      </div>
      </div>
</footer>

<template id="products-tab-template">
  <h1>📦 Product Management</h1>

  <div id="admin-add-product-section" class="admin-form-section admin-form-section--add">
    <h3>Add New Product</h3>
    <div class="admin-form-grid">
      <input id="new-product-name" class="search-input" placeholder="Product Name">
      <input id="new-product-price" class="search-input" type="number" placeholder="Price (EGP)">
      <input id="new-product-stock" class="search-input" type="number" placeholder="Stock">
      <select id="new-product-category" class="search-input">
        <option value="">Select Category</option>
        <option value="Electronics">Electronics</option>
        <option value="Accessories">Accessories</option>
        <option value="Grocery">Grocery</option>
        <option value="Skin Care">Skin Care</option>
      </select>
      <input id="new-product-image" class="search-input" type="file" accept="image/*">
      <input id="new-product-rating" class="search-input" type="number" step="0.1" placeholder="Rating (0-5)">
    </div>
    <textarea id="new-product-description" class="search-input admin-form-textarea" placeholder="Description"></textarea>
    <button onclick="addNewProduct()" class="search-button admin-form-submit">+ Add Product</button>
  </div>

  <div id="admin-edit-product-section" class="admin-form-section admin-form-section--edit">
    <div class="admin-edit-header">
      <h3>✏️ Edit Product</h3>
      <button onclick="cancelEditProduct()" class="admin-cancel-btn">✕ Cancel</button>
    </div>
    <input type="hidden" id="edit-product-id">
    <div class="admin-form-grid">
      <input id="edit-product-name" class="search-input" placeholder="Product Name">
      <input id="edit-product-price" class="search-input" type="number" placeholder="Price (EGP)">
      <input id="edit-product-stock" class="search-input" type="number" placeholder="Stock">
      <select id="edit-product-category" class="search-input">
        <option value="">Select Category</option>
        <option value="Electronics">Electronics</option>
        <option value="Accessories">Accessories</option>
        <option value="Grocery">Grocery</option>
        <option value="Skin Care">Skin Care</option>
      </select>
      <input id="edit-product-image" class="search-input" type="file" accept="image/*">
      <input id="edit-product-rating" class="search-input" type="number" step="0.1" placeholder="Rating (0-5)">
    </div>
    <textarea id="edit-product-description" class="search-input admin-form-textarea" placeholder="Description"></textarea>
    <button onclick="saveEditProduct()" class="search-button admin-form-submit">💾 Save Changes</button>
  </div>

  <table class="admin-table">
    <tr><th>ID</th><th>Name</th><th>Price</th><th>Stock</th><th>Category</th><th>Action</th></tr>
    <tbody id="products-table-body"></tbody>
  </table>
</template>

<div id="messageBox" class="message-box"></div>
<script src="js/script.js"></script>
</body>
</html>
